<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div id="left-side-nav" class="nav-element">
            <img src="images/youTubeMenu.svg" alt="whoops">
            <img src="images/youTubeIcon.png" alt="youtubeIcon">
        </div>

        <div id="middle-nav" class="nav-element">
            <input type="text" name="search" id="searchBar" placeholder="Search">
            <button id="searchButton"> </button>
            <img src="images/Microphone.png" href="" alt="enable microphone">
        </div>

        <div id="right-side-nav" class="nav-element">
            <img src="images/videoIcon.svg">
            <img src="images/googleApps.svg">
            <img src="images/alertIcon.png">
            <button id="sign-in">SIGN IN</button>
        </div>
    </nav>

    <div id="content">

        <div id="video-comment-container">

            <div id="video-container">
                <iframe width="560" height="315" src="https://www.youtube.com/embed/4I1WgJz_lmA" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                <!-- Here is where the video goes -->
            </div>

            <div id="video-notes-container">
                <!-- Here is where the video title, likes, etc. goes -->
            </div>

            <div id="video-description-container">
                <!-- This is where the author and video description go -->
            </div>

            <div id="comments-container">

            </div>

        </div>

        <div id="more-videos-container">
            <!-- This is the aside for more videos -->


        </div>




    </div>







</body>
</html>
